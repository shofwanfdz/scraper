{% extends "base.html" %}

{% block title %}Hasil Scraping — Scraping Tools{% endblock %}
{% block nav_results %}active{% endblock %}

{% block content %}
<section class="page">
        <!-- Page Header -->
        <div class="page-header">
            <h1>Hasil Scraping</h1>
            <p class="lead">Semua file hasil ekstraksi data produk dari marketplace</p>
        </div>

        <!-- Results Container -->
        <section id="results-list">
            <!-- Loading state -->
            <div class="empty-state" id="loading-state">
                <div class="spinner"></div>
                <p class="text-secondary">Memuat data...</p>
            </div>
        </section>
</section>
{% endblock %}

{% block scripts %}
<script>
    async function loadResults() {
        const container = document.getElementById('results-list');
        const loading = document.getElementById('loading-state');

        try {
            const res = await fetch('/api/results');
            const data = await res.json();

            if (!data.files || data.files.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-title">Belum ada hasil scraping</div>
                        <div class="empty-state-desc">Mulai scraping dari halaman utama untuk menghasilkan data</div>
                        <a href="/" class="btn primary mt-3">Mulai Scraping</a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>File</th>
                                <th>Marketplace</th>
                                <th>Ukuran</th>
                                <th>Tanggal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            data.files.forEach(f => {
                html += `
                    <tr>
                        <td class="col-name">${f.name}</td>
                        <td><span class="marketplace-badge marketplace-badge--${f.marketplace}">${f.marketplace}</span></td>
                        <td class="col-muted">${f.size_kb} KB</td>
                        <td class="col-muted">${f.date}</td>
                        <td>
                            <a href="/api/download/${f.marketplace}/${f.name}" class="btn primary btn-sm">Download</a>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <div class="empty-state-title">Gagal memuat data</div>
                    <div class="empty-state-desc">${err.message}</div>
                    <button onclick="loadResults()" class="btn secondary mt-3">Coba Lagi</button>
                </div>
            `;
        }
    }

    loadResults();
</script>
{% endblock %}
